# .github/workflows/swarm_automerge.yml
# Resolves agentvault#1: Swarm auto-merge PRs
#
# Triggers:
#   - On PR opened / ready-for-review / labeled
#   - On push to main (re-checks any open PRs)
# Merges any PR from EvezArt (owner) that passes all required checks.
# Uses squash merge. Closes linked issue via commit message if present.

name: Swarm Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge owner PRs
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: pull-request-title-and-description
          MERGE_FILTER_AUTHOR: EvezArt
          MERGE_LABELS: ""
          MERGE_REQUIRED_APPROVALS: 0
          UPDATE_METHOD: rebase
          MERGE_RETRIES: "6"
          MERGE_RETRY_SLEEP: "10000"
