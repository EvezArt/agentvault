name: Autonomous Vault Heartbeat

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  vault-cycle:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run vault heartbeat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: python vault/heartbeat.py
